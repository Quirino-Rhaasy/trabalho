name: Python CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Configurar Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      - name: Instalar dependências

        run: |
          pip install -r requirements.txt

      - name: Executar testes

        run: |
          pytest
